name: Validate Card Data
on:
  push:
    paths:
      - "src/data/**"
      - "src/types/**"
  pull_request:
    paths:
      - "src/data/**"
      - "src/types/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate-cards
